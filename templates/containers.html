<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Container</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head>
<body class="bg-light">{% include '_nav.html' %}
<div class="container py-4">
  <h1 class="h4">Container Management</h1>
  <div class="table-responsive"><table class="table table-sm table-striped" id="tbl"><thead><tr><th>Name</th><th>Image</th><th>Status</th><th>CPU</th><th>RAM</th><th>Ports</th><th>Aktionen</th></tr></thead><tbody></tbody></table></div>
  <pre id="inspectOut" class="small bg-white border rounded p-3">Inspect-Ausgabe…</pre>
</div>
<script>
async function j(url,opt){const r=await fetch(url,opt||{});return await r.json();}
function btn(label,cls,fn){const b=document.createElement('button');b.className=`btn btn-${cls} btn-sm me-1`;b.textContent=label;b.onclick=fn;return b;}
async function load(){
  const data=await j('/api/docker/containers?all=1');
  const tb=document.querySelector('#tbl tbody'); tb.innerHTML='';
  for(const c of (data.containers||[])){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${c.name||''}</td><td>${c.image||''}</td><td>${c.status||''}</td><td>${c.cpu||'-'}</td><td>${c.mem||'-'}</td><td>${c.ports||''}</td><td></td>`;
    const act=tr.children[6];
    act.appendChild(btn('Start','success',async()=>{await j(`/api/docker/container/${c.id}/start`,{method:'POST'});load();}));
    act.appendChild(btn('Stop','warning',async()=>{await j(`/api/docker/container/${c.id}/stop`,{method:'POST'});load();}));
    act.appendChild(btn('Restart','secondary',async()=>{await j(`/api/docker/container/${c.id}/restart`,{method:'POST'});load();}));
    act.appendChild(btn('Inspect','info',async()=>{const x=await j(`/api/docker/container/${c.id}/inspect`);document.getElementById('inspectOut').textContent=JSON.stringify(x,null,2);}));
    tb.appendChild(tr);
  }
}
load();
</script>
</body></html>
