<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Docker-Lab Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head>
<body class="bg-light">{% include '_nav.html' %}
<div class="container py-4">
  <div class="row g-3">
    <div class="col-12 col-md-6"><div class="card"><div class="card-body"><h5>Docker Daemon</h5><div id="daemonStatus">{{ 'erreichbar' if docker_ok else 'nicht erreichbar' }}</div><div class="text-secondary small">Version: {{ docker_version or '—' }}</div></div></div></div>
    <div class="col-12 col-md-6"><div class="card"><div class="card-body"><h5>Container Übersicht</h5><div id="containerSummary">Lädt…</div></div></div></div>
    <div class="col-12 col-xl-6"><div class="card"><div class="card-body"><h5>Speicher / Docker-System</h5><pre id="systemDf" class="small mb-0">Lädt…</pre></div></div></div>
    <div class="col-12 col-xl-6"><div class="card"><div class="card-body"><h5>Aktionen</h5><div class="d-flex gap-2 flex-wrap"><button id="btnRefresh" class="btn btn-primary btn-sm">Refresh</button><button id="btnPrune" class="btn btn-outline-danger btn-sm">Prune (ohne Volumes)</button><button id="btnPruneVol" class="btn btn-danger btn-sm">Prune + Volumes</button></div><div id="actionStatus" class="small text-secondary mt-2">Bereit.</div></div></div></div>
  </div>
</div>
<script>
async function j(url,opt){const r=await fetch(url,opt||{});return await r.json();}
async function refresh(){
  const c=await j('/api/docker/containers?all=1');
  const run=(c.containers||[]).filter(x=>String(x.state||'').toLowerCase()==='running').length;
  document.getElementById('containerSummary').textContent=`${c.count||0} Container gesamt · ${run} running`;
  const df=await j('/api/docker/system/df');
  document.getElementById('systemDf').textContent=JSON.stringify(df,null,2);
}
async function prune(vol){
  document.getElementById('actionStatus').textContent='Prune läuft…';
  const r=await j('/api/docker/prune',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({volumes:!!vol})});
  document.getElementById('actionStatus').textContent=r.ok?'Prune abgeschlossen':'Prune fehlgeschlagen';
  await refresh();
}
document.getElementById('btnRefresh').addEventListener('click',refresh);
document.getElementById('btnPrune').addEventListener('click',()=>prune(false));
document.getElementById('btnPruneVol').addEventListener('click',()=>prune(true));
refresh();
</script>
</body></html>
