<style>
  .jarvis-nav { background: #0b1120; border-bottom: 1px solid #1e3a5f; padding: .7rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; gap: 10px; flex-wrap: wrap; }
  .jarvis-nav .nav-brand-wrap { display:flex; align-items:center; gap:8px; }
  .jarvis-nav .nav-brand { font-weight: 700; color: #60a5fa; font-size: .9rem; }
  .jarvis-nav .nav-lab-switcher { min-width:170px; padding:6px 8px; border-radius:8px; border:1px solid #2c3c63; background:#111b30; color:#e2e8f0; font-size:.78rem; }
  .jarvis-nav .nav-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-left:auto; }
  .jarvis-nav .nav-portal-name { font-size:.8rem; font-weight:600; color:#e2e8f0; }
  .jarvis-nav .nav-portal-status, .jarvis-nav .nav-update-status { font-size:.72rem; color:#94a3b8; }
  .jarvis-nav .nav-sync-btn, .jarvis-nav .nav-update-btn { white-space: nowrap; color:#fff; border:1px solid transparent; padding:7px 10px; border-radius:8px; }
  .jarvis-nav .nav-sync-btn { background:#2563eb; border-color:#2563eb; }
  .jarvis-nav .nav-update-btn { background:#1f8a5b; border-color:#1f8a5b; }
  .jarvis-nav .nav-links { display:flex; gap:.5rem; flex-wrap:wrap; }
  .jarvis-nav .nav-links a { color:#94a3b8; font-size:.8rem; padding:.2rem .5rem; border-radius:.3rem; text-decoration:none; }
  .jarvis-nav .nav-links a:hover, .jarvis-nav .nav-links a.active { color:#e2e8f0; background:#1a2438; }
</style>
<nav class="jarvis-nav">
  <div class="nav-brand-wrap">
    <span class="nav-brand">🐳 Jarvis Docker-Lab</span>
    <select id="lab-switcher" class="nav-lab-switcher"><option value="">Module wechseln…</option></select>
  </div>
  <div class="nav-actions">
    <div><div id="portalNodeName" class="nav-portal-name">—</div><div id="portalSyncStatus" class="nav-portal-status">Status wird geladen…</div></div>
    <div><div id="repoUpdateStatus" class="nav-update-status">Update-Check…</div></div>
    <button id="repo-update-apply" class="nav-update-btn">⬆ Update</button>
    <button id="dashboard-sync-btn" class="nav-sync-btn">↻ Sync</button>
    <div class="nav-links">
      <a href="/"{% if active_page == 'dashboard' %} class="active"{% endif %}>Dashboard</a>
      <a href="/containers"{% if active_page == 'containers' %} class="active"{% endif %}>Container</a>
      <a href="/status"{% if active_page == 'status' %} class="active"{% endif %}>Status</a>
      <a href="/mcp-actions"{% if active_page == 'mcp' %} class="active"{% endif %}>MCP Actions</a>
      <a href="/link"{% if active_page == 'link' %} class="active"{% endif %}>Panel Link</a>
      <a href="/info"{% if active_page == 'info' %} class="active"{% endif %}>Info</a>
    </div>
  </div>
</nav>
<script>
(function(){
  if (window.__jarvisDockerLabNavBound) return; window.__jarvisDockerLabNavBound=true;
  async function jget(url){ const r=await fetch(url,{headers:{Accept:'application/json'},cache:'no-store'}); return r.json(); }
  async function jpost(url,payload){ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify(payload||{})}); return r.json(); }
  function renderUpdateStatus(p){ const el=document.getElementById('repoUpdateStatus'); if(!el) return; if(p&&p.ok&&p.update_available){el.textContent=`Update verfügbar · behind ${p.behind ?? '?'}`;el.style.color='#fbbf24';return;} if(p&&p.ok){el.textContent='Up-to-date';el.style.color='#4ade80';return;} el.textContent='Update-Status unbekannt';el.style.color='#fca5a5'; }
  async function refreshUpdateStatus(){ try{ const j=await jget('/api/update/status'); renderUpdateStatus(j); return j; }catch(_){ renderUpdateStatus({ok:false}); return {ok:false}; } }
  async function refreshPortalStatus(){ const nameEl=document.getElementById('portalNodeName'); const statusEl=document.getElementById('portalSyncStatus'); if(!nameEl||!statusEl) return; try{ const j=await jget('/api/portal/status'); nameEl.textContent=j.nodeName||'—'; if(j.registered){ statusEl.textContent=j.nodeSlug?`registriert · ${j.nodeSlug}`:'registriert'; statusEl.style.color='#4ade80'; } else { statusEl.textContent='nicht registriert'; statusEl.style.color='#fca5a5'; } }catch(_){ statusEl.textContent='Status nicht verfügbar'; statusEl.style.color='#fca5a5'; } }
  async function runDashboardSync(){ const btn=document.getElementById('dashboard-sync-btn'); const s=document.getElementById('portalSyncStatus'); if(!btn) return; const old=btn.textContent; btn.disabled=true; btn.textContent='Sync läuft…'; if(s){ s.textContent='Sync läuft…'; s.style.color='#94a3b8'; } try{ await jpost('/api/portal/sync',{}); await refreshPortalStatus(); } catch(_){ if(s){ s.textContent='Sync fehlgeschlagen'; s.style.color='#fca5a5'; } } finally{ btn.disabled=false; btn.textContent=old; } }
  async function applyAutoUpdate(){ const btn=document.getElementById('repo-update-apply'); if(!btn) return; const old=btn.textContent; btn.disabled=true; btn.textContent='Prüfe…'; try{ const st=await refreshUpdateStatus(); if(!(st&&st.ok&&st.update_available)){ btn.textContent='Aktuell'; setTimeout(()=>{btn.textContent=old;btn.disabled=false;},900); return; } btn.textContent='Update…'; const res=await jpost('/api/update/apply',{}); renderUpdateStatus(res); if(res&&res.ok){ btn.textContent='Neustart…'; setTimeout(()=>window.location.reload(),1600); return; } }catch(_){ renderUpdateStatus({ok:false}); } btn.textContent=old; btn.disabled=false; }
  async function loadPeerModules(){ const sel=document.getElementById('lab-switcher'); if(!sel) return; const cur=String(window.location.port||(window.location.protocol==='https:'?'443':'80')); try{ const res=await jget('/api/portal/peers'); const rows=Array.isArray(res?.data?.peers)?res.data.peers:[]; for(const row of rows){ const port=String(row.port||'').trim(); if(!port) continue; const opt=document.createElement('option'); opt.value=port; opt.textContent=`${row.name||'Module'} (${port})`; if(port===cur) opt.selected=true; sel.appendChild(opt); } }catch(_){ } sel.addEventListener('change',()=>{ const port=String(sel.value||'').trim(); if(!port) return; window.location.href=`${window.location.protocol}//${window.location.hostname}:${port}/`; }); }
  document.addEventListener('DOMContentLoaded',()=>{ document.getElementById('dashboard-sync-btn')?.addEventListener('click',runDashboardSync); document.getElementById('repo-update-apply')?.addEventListener('click',applyAutoUpdate); refreshPortalStatus(); refreshUpdateStatus(); loadPeerModules(); });
})();
</script>
